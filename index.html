<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rick Leitch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Glitchy Name -->
        <div class="name-container">
            <h1 class="glitch" data-text="Rick Leitch">Rick Leitch</h1>
        </div>
        
        <!-- Replace the .fiero-container section with this: -->
<div class="fiero-container">
    <svg class="fiero" viewBox="0 0 600 800" xmlns="http://www.w3.org/2000/svg">
        <g class="wireframe">
            <!-- Head outline -->
            <ellipse cx="300" cy="180" rx="70" ry="85" stroke="#FF6B35" stroke-width="2.5" fill="none"/>
            
            <!-- Jaw/chin -->
            <path d="M 245 220 L 240 245 L 250 265 L 300 275 L 350 265 L 360 245 L 355 220" 
                  stroke="#FF6B35" stroke-width="2.5" fill="none"/>
            
            <!-- Hair (spiky, iconic) -->
            <path d="M 245 130 L 250 100 L 260 85 L 270 95 L 280 75 L 290 90 L 300 70 L 310 85 L 320 75 L 330 90 L 340 80 L 350 100 L 355 130" 
                  stroke="#FF6B35" stroke-width="2.5" fill="none"/>
            <line x1="260" y1="85" x2="255" y2="65" stroke="#FF6B35" stroke-width="2"/>
            <line x1="280" y1="75" x2="280" y2="55" stroke="#FF6B35" stroke-width="2"/>
            <line x1="300" y1="70" x2="300" y2="45" stroke="#FF6B35" stroke-width="2"/>
            <line x1="320" y1="75" x2="320" y2="55" stroke="#FF6B35" stroke-width="2"/>
            <line x1="340" y1="80" x2="345" y2="60" stroke="#FF6B35" stroke-width="2"/>
            
            <!-- Eyes (intense) -->
            <line x1="265" y1="170" x2="285" y2="175" stroke="#00F5D4" stroke-width="2.5"/>
            <line x1="315" y1="175" x2="335" y2="170" stroke="#00F5D4" stroke-width="2.5"/>
            <circle cx="275" cy="173" r="3" fill="#00F5D4"/>
            <circle cx="325" cy="173" r="3" fill="#00F5D4"/>
            
            <!-- Eyebrows (angry/determined) -->
            <line x1="260" y1="160" x2="290" y2="165" stroke="#FF6B35" stroke-width="2"/>
            <line x1="310" y1="165" x2="340" y2="160" stroke="#FF6B35" stroke-width="2"/>
            
            <!-- Nose -->
            <line x1="300" y1="190" x2="300" y2="210" stroke="#FF6B35" stroke-width="1.5"/>
            <line x1="300" y1="210" x2="310" y2="215" stroke="#FF6B35" stroke-width="1.5"/>
            
            <!-- Mouth (stern) -->
            <line x1="280" y1="235" x2="320" y2="235" stroke="#FF6B35" stroke-width="2"/>
            
            <!-- Neck -->
            <line x1="265" y1="260" x2="265" y2="300" stroke="#FF6B35" stroke-width="2.5"/>
            <line x1="335" y1="260" x2="335" y2="300" stroke="#FF6B35" stroke-width="2.5"/>
            
            <!-- Shoulders (broad, muscular) -->
            <path d="M 265 300 L 200 320 L 160 360 L 150 380" 
                  stroke="#FF6B35" stroke-width="3" fill="none"/>
            <path d="M 335 300 L 400 320 L 440 360 L 450 380" 
                  stroke="#FF6B35" stroke-width="3" fill="none"/>
            
            <!-- Torso (muscular) -->
            <path d="M 265 300 L 250 350 L 240 450 L 245 520 L 260 550" 
                  stroke="#FF6B35" stroke-width="2.5" fill="none"/>
            <path d="M 335 300 L 350 350 L 360 450 L 355 520 L 340 550" 
                  stroke="#FF6B35" stroke-width="2.5" fill="none"/>
            
            <!-- Chest definition (pecs) -->
            <path d="M 265 320 Q 280 340, 300 335" stroke="#C0C0C0" stroke-width="1.5" fill="none"/>
            <path d="M 335 320 Q 320 340, 300 335" stroke="#C0C0C0" stroke-width="1.5" fill="none"/>
            
            <!-- Seven scars - Big Dipper pattern (iconic Hokuto mark) -->
            <circle cx="270" cy="360" r="4" stroke="#FBB13C" stroke-width="2" fill="none"/>
            <circle cx="290" cy="350" r="4" stroke="#FBB13C" stroke-width="2" fill="none"/>
            <circle cx="310" cy="355" r="4" stroke="#FBB13C" stroke-width="2" fill="none"/>
            <circle cx="330" cy="360" r="4" stroke="#FBB13C" stroke-width="2" fill="none"/>
            <circle cx="280" cy="390" r="4" stroke="#FBB13C" stroke-width="2" fill="none"/>
            <circle cx="300" cy="400" r="4" stroke="#FBB13C" stroke-width="2" fill="none"/>
            <circle cx="320" cy="395" r="4" stroke="#FBB13C" stroke-width="2" fill="none"/>
            
            <!-- Connecting lines between scars (constellation style) -->
            <line x1="270" y1="360" x2="290" y2="350" stroke="#FBB13C" stroke-width="0.5" opacity="0.6"/>
            <line x1="290" y1="350" x2="310" y2="355" stroke="#FBB13C" stroke-width="0.5" opacity="0.6"/>
            <line x1="310" y1="355" x2="330" y2="360" stroke="#FBB13C" stroke-width="0.5" opacity="0.6"/>
            <line x1="290" y1="350" x2="280" y2="390" stroke="#FBB13C" stroke-width="0.5" opacity="0.6"/>
            <line x1="310" y1="355" x2="300" y2="400" stroke="#FBB13C" stroke-width="0.5" opacity="0.6"/>
            <line x1="330" y1="360" x2="320" y2="395" stroke="#FBB13C" stroke-width="0.5" opacity="0.6"/>
            
            <!-- Abs definition -->
            <line x1="285" y1="420" x2="315" y2="420" stroke="#C0C0C0" stroke-width="1" opacity="0.7"/>
            <line x1="280" y1="450" x2="320" y2="450" stroke="#C0C0C0" stroke-width="1" opacity="0.7"/>
            <line x1="275" y1="480" x2="325" y2="480" stroke="#C0C0C0" stroke-width="1" opacity="0.7"/>
            <line x1="270" y1="510" x2="330" y2="510" stroke="#C0C0C0" stroke-width="1" opacity="0.7"/>
            <line x1="300" y1="320" x2="300" y2="530" stroke="#C0C0C0" stroke-width="1" opacity="0.5"/>
            
            <!-- Arms (left - raised/flexed) -->
            <path d="M 150 380 L 140 420 L 135 460 L 140 500" 
                  stroke="#FF6B35" stroke-width="2.5" fill="none"/>
            <path d="M 160 380 L 155 420 L 152 460 L 155 500" 
                  stroke="#FF6B35" stroke-width="2.5" fill="none"/>
            
            <!-- Forearm left -->
            <path d="M 140 500 L 145 540 L 150 580" 
                  stroke="#FF6B35" stroke-width="2.5" fill="none"/>
            <path d="M 155 500 L 158 540 L 160 580" 
                  stroke="#FF6B35" stroke-width="2.5" fill="none"/>
            
            <!-- Fist left -->
            <rect x="145" y="580" width="20" height="25" stroke="#FF6B35" stroke-width="2.5" fill="none"/>
            
            <!-- Arms (right - at side) -->
            <path d="M 450 380 L 460 430 L 465 480 L 460 520" 
                  stroke="#FF6B35" stroke-width="2.5" fill="none"/>
            <path d="M 440 380 L 445 430 L 448 480 L 445 520" 
                  stroke="#FF6B35" stroke-width="2.5" fill="none"/>
            
            <!-- Forearm right -->
            <path d="M 460 520 L 455 560 L 450 600" 
                  stroke="#FF6B35" stroke-width="2.5" fill="none"/>
            <path d="M 445 520 L 442 560 L 440 600" 
                  stroke="#FF6B35" stroke-width="2.5" fill="none"/>
            
            <!-- Fist right -->
            <rect x="435" y="600" width="20" height="25" stroke="#FF6B35" stroke-width="2.5" fill="none"/>
            
            <!-- Waist/Belt -->
            <line x1="260" y1="550" x2="340" y2="550" stroke="#FBB13C" stroke-width="3"/>
            <rect x="290" y="545" width="20" height="15" stroke="#FBB13C" stroke-width="2" fill="none"/>
            
            <!-- Legs -->
            <path d="M 260 550 L 255 600 L 250 680 L 245 730" 
                  stroke="#FF6B35" stroke-width="2.5" fill="none"/>
            <path d="M 280 550 L 278 600 L 275 680 L 273 730" 
                  stroke="#FF6B35" stroke-width="2.5" fill="none"/>
            <path d="M 320 550 L 322 600 L 325 680 L 327 730" 
                  stroke="#FF6B35" stroke-width="2.5" fill="none"/>
            <path d="M 340 550 L 345 600 L 350 680 L 355 730" 
                  stroke="#FF6B35" stroke-width="2.5" fill="none"/>
            
            <!-- Boots -->
            <rect x="235" y="730" width="48" height="35" stroke="#FBB13C" stroke-width="2.5" fill="none"/>
            <rect x="317" y="730" width="48" height="35" stroke="#FBB13C" stroke-width="2.5" fill="none"/>
            
            <!-- Grid overlay (NASA technical aesthetic) -->
            <line x1="150" y1="200" x2="450" y2="200" stroke="#00F5D4" stroke-width="0.5" opacity="0.2"/>
            <line x1="150" y1="350" x2="450" y2="350" stroke="#00F5D4" stroke-width="0.5" opacity="0.2"/>
            <line x1="150" y1="500" x2="450" y2="500" stroke="#00F5D4" stroke-width="0.5" opacity="0.2"/>
            <line x1="150" y1="650" x2="450" y2="650" stroke="#00F5D4" stroke-width="0.5" opacity="0.2"/>
            
            <line x1="200" y1="100" x2="200" y2="750" stroke="#00F5D4" stroke-width="0.5" opacity="0.2"/>
            <line x1="300" y1="100" x2="300" y2="750" stroke="#00F5D4" stroke-width="0.5" opacity="0.2"/>
            <line x1="400" y1="100" x2="400" y2="750" stroke="#00F5D4" stroke-width="0.5" opacity="0.2"/>
        </g>
        
        <!-- Technical annotations -->
        <text x="480" y="180" class="tech-label">SUCCESSOR</text>
        <text x="100" y="360" class="tech-label">北斗神拳</text>
        <text x="370" y="400" class="tech-label">BIG DIPPER</text>
        <text x="480" y="550" class="tech-label">199X</text>
    </svg>
</div>

        
        <!-- Rotating Pantheist Quote -->
        <div class="quote-container">
            <blockquote class="quote" id="quote"></blockquote>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
